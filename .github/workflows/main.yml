name: Deploy to ProFreeHost

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.0
        with:
          server: ftpupload.net
          username: epiz_12345678   # your ProFreeHost FTP username
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./            # repo root goes into /htdocs
